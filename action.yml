name: "PolyScan"
description: "Lightweight multi-language SAST scan (Semgrep, Bandit, ESLint, SpotBugs) with Quality Gate + SARIF"
author: "Stefan Raisl"
branding:
  icon: "shield"
  color: "red"

inputs:
  target:
    description: "Path to scan (default: repo root)"
    required: false
    default: "."
  engines:
    description: "Comma-separated engines (semgrep,bandit,eslint,spotbugs)"
    required: false
    default: "semgrep,bandit,eslint"
  format:
    description: "Report format (md, json, sarif)"
    required: false
    default: "sarif"
  max-critical:
    description: "Max critical findings before the Quality Gate fails"
    required: false
    default: "0"
  max-high:
    description: "Max high findings before the Quality Gate fails"
    required: false
    default: "0"
  max-medium:
    description: "Max medium findings before the Quality Gate fails"
    required: false
    default: "50"
  gate:
    description: "Apply the Quality Gate (exit 1 on failure)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2
    - name: Sync PolyScan + engines (uv, locked)
      shell: bash
      run: |
        uv sync --frozen --extra scan
        uv pip install --system .
        npm install -g eslint@8
        # optional Java engine (needs JDK; install via apt if missing)
        if ! which java >/dev/null 2>&1; then
          sudo apt-get update && sudo apt-get install -y openjdk-21-jdk-headless || echo "java install failed"
        fi
        polyscan download-engines || echo "spotbugs assets unavailable — skipping"

    - name: Run PolyScan
      shell: bash
      run: |
        polyscan scan "${{ inputs.target }}" \
          -e "${{ inputs.engines }}" \
          --format "${{ inputs.format }}" \
          -o "polyscan.sarif" \
          --summary "polyscan-summary.md" \
          --max-critical "${{ inputs.max-critical }}" \
          --max-high "${{ inputs.max-high }}" \
          --max-medium "${{ inputs.max-medium }}" \
          ${{ inputs.gate == 'true' && '--gate' || '--no-gate' }}

    - name: Write Job Summary
      if: always()
      shell: bash
      run: |
        if [ -f polyscan-summary.md ]; then
          cat polyscan-summary.md >> "$GITHUB_STEP_SUMMARY"
        else
          echo "PolyScan produced no summary file." >> "$GITHUB_STEP_SUMMARY"
        fi
