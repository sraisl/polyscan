name: "PolyScan"
description: "Lightweight multi-language SAST scan (Semgrep, Bandit, ESLint, SpotBugs) with Quality Gate + SARIF"
author: "Stefan Raisl"
branding:
  icon: "shield"
  color: "red"

inputs:
  target:
    description: "Path to scan (default: repo root)"
    required: false
    default: "."
  engines:
    description: "Comma-separated engines (semgrep,bandit,eslint,spotbugs)"
    required: false
    default: "semgrep,bandit,eslint"
  format:
    description: "Report format (md, json, sarif)"
    required: false
    default: "sarif"
  max-critical:
    description: "Max critical findings before the Quality Gate fails"
    required: false
    default: "0"
  max-high:
    description: "Max high findings before the Quality Gate fails"
    required: false
    default: "0"
  max-medium:
    description: "Max medium findings before the Quality Gate fails"
    required: false
    default: "50"
  gate:
    description: "Apply the Quality Gate (exit 1 on failure)"
    required: false
    default: "true"

runs:
  using: "docker"
  image: "docker://ghcr.io/sraisl/polyscan:latest"
  args:
    - "scan"
    - ${{ inputs.target }}
    - "-e"
    - ${{ inputs.engines }}
    - "--format"
    - ${{ inputs.format }}
    - "-o"
    - "polyscan.sarif"
    - "--max-critical"
    - ${{ inputs.max-critical }}
    - "--max-high"
    - ${{ inputs.max-high }}
    - "--max-medium"
    - ${{ inputs.max-medium }}
    - ${{ inputs.gate == 'true' && '--gate' || '--no-gate' }}
