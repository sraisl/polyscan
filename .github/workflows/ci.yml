name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write        # needed to push to GHCR
  security-events: write  # needed to upload SARIF

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync dependencies (locked)
        run: uv sync --frozen --extra dev --extra scan
      - run: npm install -g eslint@8
      - run: uv run pytest -q

  docker:
    runs-on: ubuntu-latest
    # only build & push on main (not PRs from forks)
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          # no QEMU needed; native amd64 runner

  polyscan:
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v7
      - name: PolyScan self-scan (SARIF)
        uses: sraisl/polyscan@main
        with:
          target: "."
          engines: "semgrep,bandit,eslint"
          format: "sarif"
      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: polyscan.sarif
