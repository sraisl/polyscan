name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync dependencies (locked)
        run: uv sync --frozen --extra dev --extra scan
      - run: npm install -g eslint@8
      - run: uv run pytest -q

  polyscan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # needed to upload SARIF
      contents: read
      actions: read            # needed by upload-sarif telemetry / run info
    steps:
      - uses: actions/checkout@v7
      - name: PolyScan self-scan (SARIF)
        uses: sraisl/polyscan@main
        with:
          target: "."
          engines: "semgrep,bandit,eslint"
          format: "sarif"
      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: polyscan.sarif
