name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install . pytest semgrep bandit
      - run: npm install -g eslint@8
      - run: pytest -q

  polyscan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PolyScan self-scan
        uses: sraisl/polyscan@main
        with:
          target: "."
          engines: "semgrep,bandit,eslint"
          format: "md"
